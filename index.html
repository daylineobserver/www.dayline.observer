<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2WN9K4M2YY"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-2WN9K4M2YY');
    </script>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link rel="icon" type="image/x-icon" href="/resources/favicon.ico">
    <title>Dayline Observer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/utc.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/timezone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <script>
        if (typeof dayjs !== 'undefined' && typeof dayjs_plugin_utc !== 'undefined') {
            dayjs.extend(dayjs_plugin_utc);
        }
        if (typeof dayjs !== 'undefined' && typeof dayjs_plugin_timezone !== 'undefined') {
            dayjs.extend(dayjs_plugin_timezone);
        }
    </script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        .markdown-content h1, .markdown-content h2, .markdown-content h3 {
            color: inherit;
        }
        .dark .markdown-content h1, .dark .markdown-content h2, .dark .markdown-content h3 {
            color: #f8fafc;
        }
    </style>
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-gray-50 dark:bg-zinc-900 min-h-screen flex flex-col transition-colors duration-200">
<!-- Top info bar -->
<div class="bg-white dark:bg-zinc-900 border-b border-gray-100 dark:border-zinc-800 py-2 px-4 text-xs text-gray-500 dark:text-zinc-400 flex justify-between items-center">
    <div>
        Get updates that fit your day.
    </div>
</div>

<!-- Header / Navigation -->
<header class="bg-white dark:bg-zinc-900 shadow-sm sticky top-0 z-10 border-b dark:border-zinc-800">
    <div class="max-w-6xl mx-auto px-4">
        <div class="flex items-center justify-between h-16">
            <div class="flex items-center">
                <div class="h-auto max-w-[100px]">
                    <a href="#" class="logo-link">
                        <img alt="Dayline Observer logo" class="w-auto h-[4em] dark:invert" src="resources/logo.svg">
                    </a>
                </div>
                <nav class="hidden md:flex ml-10 space-x-8" id="desktop-menu">
                    <button class="tab-btn px-3 py-5 text-sm font-medium border-b-2 transition-none border-transparent text-gray-500 dark:text-zinc-400 hover:text-gray-700 dark:hover:text-zinc-200 hover:border-gray-300 dark:hover:border-zinc-700"
                            id="tab-news">
                        News
                    </button>
                    <button class="tab-btn px-3 py-5 text-sm font-medium border-b-2 transition-none border-transparent text-gray-500 dark:text-zinc-400 hover:text-gray-700 dark:hover:text-zinc-200 hover:border-gray-300 dark:hover:border-zinc-700"
                            id="tab-weather">
                        Weather
                    </button>
                    <button class="tab-btn px-3 py-5 text-sm font-medium border-b-2 transition-none border-transparent text-gray-500 dark:text-zinc-400 hover:text-gray-700 dark:hover:text-zinc-200 hover:border-gray-300 dark:hover:border-zinc-700"
                            id="tab-edb">
                        School
                    </button>
                    <button class="tab-btn px-3 py-5 text-sm font-medium border-b-2 transition-none border-transparent text-gray-500 dark:text-zinc-400 hover:text-gray-700 dark:hover:text-zinc-200 hover:border-gray-300 dark:hover:border-zinc-700"
                            id="tab-air-quality">
                        Air Quality
                    </button>
                </nav>
            </div>

            <!-- Right side actions -->
            <div class="flex items-center space-x-4">
                <!-- Desktop dark mode toggle (Hamburger) -->
                <div class="hidden md:block relative">
                    <button type="button" 
                            class="p-2 rounded-md text-gray-500 dark:text-zinc-400 hover:bg-gray-100 dark:hover:bg-zinc-800 focus:outline-none"
                            id="desktop-dark-mode-button"
                            aria-label="Settings"
                            aria-expanded="false"
                            aria-haspopup="true">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                    <div id="desktop-dark-mode-menu" 
                         class="hidden absolute right-0 mt-2 w-48 rounded-md shadow-lg py-1 bg-white dark:bg-zinc-800 ring-1 ring-black ring-opacity-5 focus:outline-none z-20">
                        <button id="desktop-toggle-dark" class="flex items-center w-full px-4 py-2 text-sm text-gray-700 dark:text-zinc-200 hover:bg-gray-100 dark:hover:bg-zinc-700">
                            <svg class="dark:hidden w-4 h-4 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                            <svg class="hidden dark:block w-4 h-4 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.243 17.657l.707.707M7.757 7.757l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path></svg>
                            <span class="dark:hidden">Dark Mode</span>
                            <span class="hidden dark:block">Light Mode</span>
                        </button>
                    </div>
                </div>

                <!-- Mobile menu button -->
                <div class="md:hidden flex items-center">
                    <button
                            type="button"
                            class="outline-none mobile-menu-button p-2 rounded-md text-gray-500 dark:text-zinc-400 hover:bg-gray-100 dark:hover:bg-zinc-800"
                            id="mobile-menu-button"
                            aria-label="Toggle navigation menu"
                            aria-expanded="false"
                            aria-controls="mobile-menu">
                        <svg class="w-6 h-6"
                             fill="none"
                             stroke="currentColor"
                             stroke-linecap="round"
                             stroke-linejoin="round"
                             stroke-width="2"
                             viewBox="0 0 24 24">
                            <path d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <!-- Mobile menu -->
    <div id="mobile-menu" class="hidden mobile-menu md:hidden border-t border-gray-100 dark:border-zinc-800 bg-white dark:bg-zinc-900">
        <nav class="flex flex-col">
            <button class="tab-btn px-4 py-3 text-sm font-medium text-left text-gray-500 dark:text-zinc-400 border-l-4 border-transparent hover:bg-gray-50 dark:hover:bg-zinc-800 hover:text-blue-600 dark:hover:text-blue-400 transition-none"
                    id="mobile-tab-news">
                News
            </button>
            <button class="tab-btn px-4 py-3 text-sm font-medium text-left text-gray-500 dark:text-zinc-400 border-l-4 border-transparent hover:bg-gray-50 dark:hover:bg-zinc-800 hover:text-blue-600 dark:hover:text-blue-400 transition-none"
                    id="mobile-tab-weather">
                Weather
            </button>
            <button class="tab-btn px-4 py-3 text-sm font-medium text-left text-gray-500 dark:text-zinc-400 border-l-4 border-transparent hover:bg-gray-50 dark:hover:bg-zinc-800 hover:text-blue-600 dark:hover:text-blue-400 transition-none"
                    id="mobile-tab-edb">
                School
            </button>
            <button class="tab-btn px-4 py-3 text-sm font-medium text-left text-gray-500 dark:text-zinc-400 border-l-4 border-transparent hover:bg-gray-50 dark:hover:bg-zinc-800 hover:text-blue-600 dark:hover:text-blue-400 transition-none"
                    id="mobile-tab-air-quality">
                Air Quality
            </button>
            
            <!-- Mobile Dark Mode Toggle Section -->
            <div class="border-t border-gray-100 dark:border-zinc-800 px-4 py-3">
                <button id="mobile-toggle-dark" class="flex items-center w-full text-sm font-medium text-gray-500 dark:text-zinc-400 hover:text-blue-600 dark:hover:text-blue-400">
                    <svg class="dark:hidden w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    <svg class="hidden dark:block w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.243 17.657l.707.707M7.757 7.757l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path></svg>
                    <span class="dark:hidden">Switch to Dark Mode</span>
                    <span class="hidden dark:block">Switch to Light Mode</span>
                </button>
            </div>
        </nav>
    </div>
</header>

<!-- Main Content -->
<main class="flex-grow max-w-6xl mx-auto px-4 py-8 w-full">
    <div id="content-area">
        <!-- Content will be injected here -->
        <div class="flex justify-center items-center h-64">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
        </div>
    </div>
</main>

<!-- Footer -->
<footer class="mt-auto border-t dark:border-zinc-800">
    <div class="bg-[#FFFBEB] dark:bg-zinc-900 dark:bg-opacity-50 py-10 px-4">
        <div class="max-w-6xl mx-auto">
            <h2 class="text-lg font-bold text-gray-800 dark:text-zinc-200 mb-6">Dayline Observer</h2>
            <div class="flex space-x-8 text-sm text-gray-600 dark:text-zinc-400">
                <a class="hover:text-gray-900 dark:hover:text-zinc-100" href="mailto:contact@base87.tech">Contact Us</a>
            </div>
        </div>
    </div>
    <div class="bg-zinc-800 dark:bg-black py-4 text-center text-xs text-white">
        <p>2026 Dayline Observer. All rights reserved. by <a href="https://www.base87.tech" target="_blank" class="underline">Base87 Technologies</a></p>
    </div>
</footer>

<script src="app.js"></script>
</body>
</html>
