<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2WN9K4M2YY"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-2WN9K4M2YY');
    </script>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link rel="icon" type="image/x-icon" href="/resources/favicon.ico">
    <title>Dayline Observer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/utc.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/timezone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <script>
        if (typeof dayjs !== 'undefined' && typeof dayjs_plugin_utc !== 'undefined') {
            dayjs.extend(dayjs_plugin_utc);
        }
        if (typeof dayjs !== 'undefined' && typeof dayjs_plugin_timezone !== 'undefined') {
            dayjs.extend(dayjs_plugin_timezone);
        }
    </script>
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
<!-- Top info bar -->
<div class="bg-white border-b border-gray-100 py-2 px-4 text-xs text-gray-500 flex justify-between items-center">
    <div>
        Get updates that fit your day.
    </div>
</div>

<!-- Header / Navigation -->
<header class="bg-white shadow-sm sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-4">
        <div class="flex items-center justify-between h-16">
            <div class="flex items-center">
                <div class="h-auto max-w-[100px]">
                    <a href="javascript:void(0)" class="logo-link">
                        <img alt="Dayline Observer logo" class="w-auto h-[4em]" src="resources/logo.svg">
                    </a>
                </div>
                <nav class="hidden md:flex ml-10 space-x-8" id="desktop-menu">
                    <button class="tab-btn px-3 py-5 text-sm font-medium border-b-2 transition-none border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300"
                            id="tab-news">
                        News
                    </button>
                    <button class="tab-btn px-3 py-5 text-sm font-medium border-b-2 transition-none border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300"
                            id="tab-weather">
                        Weather
                    </button>
                    <button class="tab-btn px-3 py-5 text-sm font-medium border-b-2 transition-none border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300"
                            id="tab-edb">
                        School
                    </button>
                    <button class="tab-btn px-3 py-5 text-sm font-medium border-b-2 transition-none border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300"
                            id="tab-air-quality">
                        Air Quality
                    </button>
                </nav>
            </div>

            <!-- Mobile menu button -->
            <div class="md:hidden flex items-center">
                <button
                        type="button"
                        class="outline-none mobile-menu-button"
                        id="mobile-menu-button"
                        aria-label="Toggle navigation menu"
                        aria-expanded="false"
                        aria-controls="mobile-menu"
                        onclick="(function(button){ var menu = document.getElementById('mobile-menu'); if (!menu) return; var isExpanded = button.getAttribute('aria-expanded') === 'true'; button.setAttribute('aria-expanded', (!isExpanded).toString()); menu.classList.toggle('hidden', isExpanded); })(this);">
                    <svg class="w-6 h-6 text-gray-500"
                         fill="none"
                         stroke="currentColor"
                         stroke-linecap="round"
                         stroke-linejoin="round"
                         stroke-width="2"
                         viewBox="0 0 24 24">
                        <path d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    <!-- Mobile menu -->
    <div class="hidden mobile-menu md:hidden border-t border-gray-100 bg-white">
        <nav class="flex flex-col">
            <button class="tab-btn px-4 py-3 text-sm font-medium text-left text-gray-500 border-l-4 border-transparent hover:bg-gray-50 hover:text-blue-600 transition-none"
                    id="mobile-tab-news">
                News
            </button>
            <button class="tab-btn px-4 py-3 text-sm font-medium text-left text-gray-500 border-l-4 border-transparent hover:bg-gray-50 hover:text-blue-600 transition-none"
                    id="mobile-tab-weather">
                Weather
            </button>
            <button class="tab-btn px-4 py-3 text-sm font-medium text-left text-gray-500 border-l-4 border-transparent hover:bg-gray-50 hover:text-blue-600 transition-none"
                    id="mobile-tab-edb">
                School
            </button>
            <button class="tab-btn px-4 py-3 text-sm font-medium text-left text-gray-500 border-l-4 border-transparent hover:bg-gray-50 hover:text-blue-600 transition-none"
                    id="mobile-tab-air-quality">
                Air Quality
            </button>
        </nav>
    </div>
</header>

<!-- Main Content -->
<main class="flex-grow max-w-6xl mx-auto px-4 py-8 w-full">
    <div id="content-area">
        <!-- Content will be injected here -->
        <div class="flex justify-center items-center h-64">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
        </div>
    </div>
</main>

<!-- Footer -->
<footer class="mt-auto">
    <div class="bg-[#FFFBEB] py-10 px-4">
        <div class="max-w-6xl mx-auto">
            <h2 class="text-lg font-bold text-gray-800 mb-6">Dayline Observer</h2>
            <div class="flex space-x-8 text-sm text-gray-600">
                <a class="hover:text-gray-900" href="mailto:contact@base87.tech">Contact Us</a>
            </div>
        </div>
    </div>
    <div class="bg-zinc-800 py-4 text-center text-xs text-white">
        <p>2026 Dayline Observer. All rights reserved. by <a href="https://www.base87.tech" target="_blank">Base87 Technologies</a></p>
    </div>
</footer>

<script src="app.js"></script>
</body>
</html>
